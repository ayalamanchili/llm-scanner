name: LLM Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      model_id:
        description: "Hugging Face model ID (e.g. gpt2, meta-llama/Llama-2-7b-chat-hf)"
        required: true
        default: "gpt2"
      scan_tools:
        description: "Comma-separated tools to run (e.g. garak)"
        required: true
        default: "garak"
      garak_probes:
        description: "Garak probe families (comma-separated, or 'all'). Use 'all' with caution — it can take 6+ hours."
        required: false
        default: "dan,promptinject,encoding,misleading,malwaregen"
      garak_detectors:
        description: "Garak detectors ('auto' = probe defaults)"
        required: false
        default: "auto"
      garak_generations:
        description: "Number of generations per probe (lower = faster, default 5)"
        required: false
        default: "5"
      model_type:
        description: "Model type/backend for Garak (huggingface, openai, etc.)"
        required: false
        default: "huggingface"

env:
  MODEL_ID: ${{ github.event.inputs.model_id || 'gpt2' }}
  SCAN_TOOLS: ${{ github.event.inputs.scan_tools || 'garak' }}
  GARAK_PROBES: ${{ github.event.inputs.garak_probes || 'dan,promptinject,encoding,misleading,malwaregen' }}
  GARAK_DETECTORS: ${{ github.event.inputs.garak_detectors || 'auto' }}
  GARAK_GENERATIONS: ${{ github.event.inputs.garak_generations || '5' }}
  MODEL_TYPE: ${{ github.event.inputs.model_type || 'huggingface' }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  # -------------------------------------------------------------------
  # Stage 1: Download / cache the model
  # -------------------------------------------------------------------
  download-model:
    name: "📥 Download Model"
    runs-on: ubuntu-latest
    outputs:
      model_cache_key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate cache key
        id: cache-key
        run: echo "key=model-${{ env.MODEL_ID }}-${{ hashFiles('scripts/download_model.sh') }}" >> "$GITHUB_OUTPUT"

      - name: Cache model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: ./model_cache
          key: ${{ steps.cache-key.outputs.key }}

      - name: Download model from Hugging Face
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/download_model.sh
          bash scripts/download_model.sh
        env:
          MODEL_CACHE_DIR: ./model_cache

  # -------------------------------------------------------------------
  # Stage 2: Prepare scan tool matrix
  # -------------------------------------------------------------------
  prepare-matrix:
    name: "🔧 Prepare Matrix"
    runs-on: ubuntu-latest
    outputs:
      tool_matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build tool matrix from input
        id: set-matrix
        shell: bash
        run: |
          # Convert comma-separated SCAN_TOOLS into a proper JSON array
          # e.g. "garak,other" -> ["garak","other"]
          TOOLS="${{ github.event.inputs.scan_tools || 'garak' }}"
          IFS=',' read -ra ARR <<< "$(echo "$TOOLS" | tr -d ' ')"
          JSON=$(printf ',"%s"' "${ARR[@]}")
          JSON="[${JSON:1}]"
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "Generated matrix: $JSON"

  # -------------------------------------------------------------------
  # Stage 3: Run security scans (matrix over selected tools)
  # -------------------------------------------------------------------
  scan:
    name: "🔍 Scan: ${{ matrix.tool }}"
    needs: [download-model, prepare-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.prepare-matrix.outputs.tool_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: ./model_cache
          key: ${{ needs.download-model.outputs.model_cache_key }}

      - name: Run tool
        run: |
          chmod +x scripts/tool_runner.sh
          chmod +x tools/*/run.sh 2>/dev/null || true
          bash scripts/tool_runner.sh "${{ matrix.tool }}"
        env:
          MODEL_PATH: ./model_cache
          RESULTS_DIR: ./results

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ matrix.tool }}
          path: ./results/
          retention-days: 30

  # -------------------------------------------------------------------
  # Stage 4: Aggregate results and produce summary
  # -------------------------------------------------------------------
  report:
    name: "📊 Generate Report"
    needs: scan
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-results
          pattern: scan-results-*
          merge-multiple: true

      - name: Parse and summarize results
        run: |
          pip install --quiet tabulate
          python scripts/parse_results.py ./all-results
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: combined-security-report
          path: ./all-results/
          retention-days: 90